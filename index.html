<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RIU Plaza Guadalajara - Elite Experience</title>
    <style>
        /* * ==========================================
         * ARQUITECTURA VISUAL ULTRA-PREMIUM Y PROTECCIÓN
         * ========================================== */
        :root {
            --fondo-espacial: #001226; 
            --dorado-brillante: #FFD700;
            --dorado-profundo: #B39700;
            --rojo-riu: #E50027;
            --texto-puro: #FFFFFF;
            --borde-luz: rgba(255, 215, 0, 0.3);
        }

        /* Bloqueo total de selección para proteger propiedad intelectual */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            outline: none;
        }

        body, html {
            width: 100vw;
            min-height: 100dvh;
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--fondo-espacial);
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #lienzoParticulas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .panel-tecnologico {
            position: relative;
            z-index: 10;
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(0,0,0,0.4) 100%);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid var(--borde-luz);
            border-top: 1px solid rgba(255,215,0,0.5);
            border-left: 1px solid rgba(255,215,0,0.5);
            border-radius: 28px;
            padding: 45px 30px;
            width: 92%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(255,215,0,0.05);
        }

        .contenedor-logo { margin-bottom: 15px; }

        .saludo-dinamico {
            color: var(--dorado-brillante);
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
            text-shadow: 0 0 15px rgba(255,215,0,0.4);
        }

        .reloj-digital {
            color: rgba(255, 255, 255, 0.6);
            font-size: 13px;
            font-family: monospace;
            margin-bottom: 30px;
            letter-spacing: 1.5px;
        }

        p {
            color: var(--texto-puro);
            font-size: 17px;
            line-height: 1.6;
            margin-bottom: 40px;
            font-weight: 300;
            padding: 0 5px;
        }

        strong {
            color: var(--dorado-brillante);
            font-weight: 700;
        }

        /* Botón Tecnológico y Destello de Luz */
        .area-accion {
            position: relative;
            min-height: 80px;
        }

        .boton-plasma {
            width: 100%;
            padding: 22px;
            background: linear-gradient(135deg, rgba(255,215,0,0.12) 0%, rgba(255,215,0,0.03) 100%);
            border: 1px solid var(--dorado-brillante);
            border-radius: 14px;
            color: var(--dorado-brillante);
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 0 20px rgba(255,215,0,0.2);
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            overflow: hidden;
        }

        .boton-plasma::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.35), transparent);
            transform: skewX(-30deg);
            animation: rayo-luz 4s infinite;
        }

        @keyframes rayo-luz {
            0% { left: -100%; }
            12% { left: 200%; }
            100% { left: 200%; }
        }

        .boton-plasma:active {
            transform: scale(0.96);
            background: var(--dorado-brillante);
            color: var(--fondo-espacial);
            box-shadow: 0 0 50px var(--dorado-brillante);
        }

        /* Interfaz de Carga Secuencial */
        .pantalla-carga {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 10, 20, 0.99);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            z-index: 3;
            transition: opacity 0.4s ease;
        }

        .pantalla-carga.activa {
            opacity: 1;
            pointer-events: all;
        }

        .texto-carga {
            color: var(--dorado-brillante);
            font-size: 15px;
            font-family: monospace;
            margin-bottom: 12px;
            text-transform: uppercase;
            text-align: center;
        }

        .porcentaje-carga {
            color: var(--texto-puro);
            font-size: 46px;
            font-weight: 900;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <canvas id="lienzoParticulas"></canvas>

    <main class="panel-tecnologico">
        
        <div class="contenedor-logo">
            <svg width="220" height="80" viewBox="0 0 220 80" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                        <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#E50027" flood-opacity="0.7"/>
                    </filter>
                </defs>
                <text x="50%" y="45" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#E50027" filter="url(#glow)" text-anchor="middle" letter-spacing="5">RIU</text>
                <text x="50%" y="68" font-family="system-ui, sans-serif" font-size="11" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="3">PLAZA GUADALAJARA</text>
            </svg>
        </div>

        <div id="saludo" class="saludo-dinamico">Estableciendo...</div>
        <div id="reloj" class="reloj-digital">00:00:00</div>
        
        <p>Estimado cliente, tenga a la mano su <strong>TICKET</strong> y sus <strong>DATOS FISCALES</strong>. El sistema redactará su solicitud de inmediato.</p>

        <div class="area-accion">
            <button id="btn-iniciar" class="boton-plasma">CONTINUAR AL CORREO</button>
            
            <div id="ui-carga" class="pantalla-carga">
                <div id="texto-estado" class="texto-carga">Iniciando...</div>
                <div id="texto-porcentaje" class="porcentaje-carga">0%</div>
            </div>
        </div>

        <a id="disparador-correo" style="display:none;" href="#"></a>
    </main>

    <script>
        /**
         * @fileoverview NÚCLEO LÓGICO DE INGENIERÍA EXTREMA (Conteo 1x1, Micro-Vibración, Anti-Hack)
         */

        // 1. ESCUDO ANTI-DEPURACIÓN Y COPIA
        document.onkeydown = (e) => {
            if(e.keyCode === 123 || (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74)) || (e.ctrlKey && (e.keyCode === 85 || e.keyCode === 67))) return false;
        };

        const _0xadj=["Poderoso","Extraordinario","Magnífico","Increíble","Fabuloso","Imparable","Productivo","Grandioso","Genial","Espectacular","Fantástico","Estupendo","Brillante","Excelente","Memorable"];
        const _0xds=["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];

        // 2. HUD INTELIGENTE (Reloj y Saludo Ortográfico Perfecto)
        function _0xHUD(){
            const _0xn=new Date();
            const _0xop={year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true};
            document.getElementById('reloj').innerText=_0xn.toLocaleDateString('es-MX',_0xop).toUpperCase().replace(',', ' |');

            if(document.getElementById('saludo').innerText==="Estableciendo..."){
                const _0xh=_0xn.getHours();
                let _0xsaludoTiempo = _0xh < 12 ? "BUENOS DÍAS" : _0xh < 19 ? "BUENAS TARDES" : "BUENAS NOCHES";
                const _0xa=_0xadj[Math.floor(Math.random()*_0xadj.length)].toUpperCase();
                const _0xd=_0xds[_0xn.getDay()].toUpperCase();
                document.getElementById('saludo').innerText=`¡${_0xsaludoTiempo}! ${_0xa} ${_0xd}`;
            }
        }
        setInterval(_0xHUD,1000);_0xHUD();

        // 3. COMPILADOR DINÁMICO DE CORREO (Fechas exactas, sin 'Atentamente')
        function _0xMail(){
            const _0xn=new Date();
            const _0xh=_0xn.getHours();
            const _0xd=_0xds[_0xn.getDay()];
            const _0xf=String(_0xn.getDate()).padStart(2,'0')+'/'+String(_0xn.getMonth()+1).padStart(2,'0')+'/'+_0xn.getFullYear();
            
            let _0xs=_0xh<12?"Buen día":_0xh<19?"Buenas tardes":"Buenas noches";
            let _0xt="";
            if(_0xh>=0 && _0xh<6) _0xt="madrugada";
            else if(_0xh>=6 && _0xh<12) _0xt="mañana";
            else if(_0xh>=12 && _0xh<19) _0xt="tarde";
            else _0xt="noche";

            const _0xsub=`Solicitud de Factura - Consumo en RIU Plaza Guadalajara [${_0xf}]`;
            const _0xbody=
`${_0xs}.

Por medio del presente solicito atentamente la factura correspondiente a mi consumo en el hotel.

Adjunto a este correo la imagen legible de mi ticket de compra y mis datos fiscales completos (RFC, Razón Social, Dirección, etc.) para la generación de la misma.

Agradezco de antemano su amable atención y apoyo con mi solicitud. Que siga teniendo una excelente ${_0xt} de ${_0xd}.`;

            const _0xuri=`mailto:factura.plazaguadalajara@riu.com?subject=${encodeURIComponent(_0xsub)}&body=${encodeURIComponent(_0xbody)}`;
            const _0xl=document.getElementById('disparador-correo');
            _0xl.href=_0xuri;
            _0xl.click();
        }

        // 4. MOTOR DE PROCESAMIENTO LINEAL (Conteo 1 a 1 en exactamente 3 segundos)
        const _0xb=document.getElementById('btn-iniciar');
        const _0xu=document.getElementById('ui-carga');
        const _0xe=document.getElementById('texto-estado');
        const _0xp=document.getElementById('texto-porcentaje');

        _0xb.addEventListener('click',()=>{
            // MICRO-VIBRACIÓN DE ALTA INGENIERÍA: Clic nítido y rápido
            if(navigator.vibrate) navigator.vibrate([15, 30, 15]);
            
            _0xu.classList.add('activa');
            let _0xinicio = null;
            const _0xduracionTotal = 3000; // Exactamente 3 segundos matemáticos
            let _0xporcentajeAnterior = -1;

            function _0xProcesarCarga(_0xtiempoActual){
                if(!_0xinicio) _0xinicio = _0xtiempoActual;
                const _0xtiempoTranscurrido = _0xtiempoActual - _0xinicio;
                
                // Interpolación Lineal Pura (Asegura que corra de 1 en 1, sin saltos raros)
                let _0xprogreso = Math.min(_0xtiempoTranscurrido / _0xduracionTotal, 1);
                const _0xporcentajeActual = Math.floor(_0xprogreso * 100);

                // Solo actualizar el DOM si el número entero cambió (optimización extrema)
                if (_0xporcentajeActual !== _0xporcentajeAnterior) {
                    _0xp.innerText = _0xporcentajeActual + '%';
                    _0xporcentajeAnterior = _0xporcentajeActual;

                    // Textos secuenciales solicitados por el Arquitecto Horacio
                    if(_0xporcentajeActual < 25) _0xe.innerText = "Redactando correo...";
                    else if(_0xporcentajeActual < 50) _0xe.innerText = "Redactando asunto...";
                    else if(_0xporcentajeActual < 75) _0xe.innerText = "Insertando fecha del día...";
                    else if(_0xporcentajeActual < 100) _0xe.innerText = "Aplicando firma de seguridad...";
                    else {
                        _0xe.innerText = "¡LISTO!"; 
                        _0xe.style.color = "#00FF66";
                        setTimeout(()=>{
                            _0xMail(); // Dispara el correo mágicamente
                            setTimeout(()=>{ 
                                _0xu.classList.remove('activa'); 
                                _0xe.style.color = "var(--dorado-brillante)"; 
                            }, 1200);
                        }, 200);
                        return; // Termina la animación
                    }
                }
                
                // Si no ha llegado a 100, pedir el siguiente cuadro al procesador
                if (_0xprogreso < 1) {
                    requestAnimationFrame(_0xProcesarCarga);
                }
            }
            requestAnimationFrame(_0xProcesarCarga);
        });

        // 5. MOTOR FÍSICO MULTIPLICADO (150 Partículas Aceleradas por GPU)
        const _0xc=document.getElementById('lienzoParticulas');
        const _0xctx=_0xc.getContext('2d',{alpha:false});
        const _0xnumParticulas = 150; // ¡Triplicamos la cantidad para un efecto WOW masivo!
        const _0xpts=new Float32Array(_0xnumParticulas * 5); // Arquitectura de Memoria Contigua
        
        function _0xRz(){ _0xc.width=window.innerWidth; _0xc.height=window.innerHeight; }
        window.addEventListener('resize',_0xRz); _0xRz();
        
        for(let i=0; i < _0xnumParticulas; i++){ 
            let j = i * 5; 
            _0xpts[j] = Math.random() * _0xc.width; 
            _0xpts[j+1] = Math.random() * _0xc.height; 
            _0xpts[j+2] = Math.random() * 1.5 + 0.3; // Radio más elegante y sutil
            _0xpts[j+3] = (Math.random() - 0.5) * 1.5; 
            _0xpts[j+4] = (Math.random() - 0.5) * 1.5; 
        }
        
        function _0xAnimarPolvo(){
            _0xctx.fillStyle='#001226'; 
            _0xctx.fillRect(0,0,_0xc.width,_0xc.height);
            _0xctx.fillStyle='rgba(255,215,0,0.5)'; 
            _0xctx.beginPath();
            
            for(let i=0; i < _0xnumParticulas; i++){
                let j = i * 5; 
                _0xpts[j] += _0xpts[j+3]; 
                _0xpts[j+1] += _0xpts[j+4];
                
                if(_0xpts[j] < 0) _0xpts[j] = _0xc.width; 
                if(_0xpts[j] > _0xc.width) _0xpts[j] = 0;
                if(_0xpts[j+1] < 0) _0xpts[j+1] = _0xc.height; 
                if(_0xpts[j+1] > _0xc.height) _0xpts[j+1] = 0;
                
                _0xctx.moveTo(_0xpts[j], _0xpts[j+1]); 
                _0xctx.arc(_0xpts[j], _0xpts[j+1], _0xpts[j+2], 0, Math.PI*2);
            }
            _0xctx.fill(); 
            requestAnimationFrame(_0xAnimarPolvo);
        }
        _0xAnimarPolvo();
    </script>
</body>
</html>
